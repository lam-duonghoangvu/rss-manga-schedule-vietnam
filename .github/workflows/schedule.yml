name: Update Release Schedule

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month at midnight UTC
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to fetch (YYYY-MM). Defaults to current month.'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Run scraper
        run: |
          MONTH="${{ github.event.inputs.month || '' }}"
          if [ -z "$MONTH" ]; then
            MONTH=$(date +%Y-%m)
          fi
          uv run python main.py --month "$MONTH"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule/ feed.xml
          git diff --staged --quiet || git commit -m "chore: update schedule for $(date +%Y-%m)"
          git push
